<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
    <linearGradient id="input" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#5a52d5"/>
    </linearGradient>
    <linearGradient id="parser" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4dabf7"/>
      <stop offset="100%" stop-color="#339af0"/>
    </linearGradient>
    <linearGradient id="css" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38d9a9"/>
      <stop offset="100%" stop-color="#20c997"/>
    </linearGradient>
    <linearGradient id="semantic" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff922b"/>
      <stop offset="100%" stop-color="#f76707"/>
    </linearGradient>
    <linearGradient id="ir" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e599f7"/>
      <stop offset="100%" stop-color="#cc5de8"/>
    </linearGradient>
    <linearGradient id="optimizer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#f03e3e"/>
    </linearGradient>
    <linearGradient id="generator" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#748ffc"/>
      <stop offset="100%" stop-color="#5c7cfa"/>
    </linearGradient>
    <linearGradient id="flutter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#40c4ff"/>
      <stop offset="100%" stop-color="#03a9f4"/>
    </linearGradient>
    <linearGradient id="compose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#82e0aa"/>
      <stop offset="100%" stop-color="#43a047"/>
    </linearGradient>
    <linearGradient id="swiftui" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a80"/>
      <stop offset="100%" stop-color="#ff5252"/>
    </linearGradient>
  </defs>

  <rect width="900" height="1200" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="50" text-anchor="middle" font-size="28" font-weight="800" fill="#1a1a2e" letter-spacing="1">motarjim Compiler Architecture</text>
  <line x1="150" y1="62" x2="750" y2="62" stroke="#dee2e6" stroke-width="1"/>

  <!-- ===== INPUT ===== -->
  <rect x="300" y="80" width="300" height="56" rx="28" fill="url(#input)" filter="url(#shadow)"/>
  <text x="450" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="white">HTML + CSS Input</text>

  <!-- Arrow down -->
  <line x1="450" y1="136" x2="450" y2="168" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd"/></marker></defs>

  <!-- ===== PHASE 1: PARSER ===== -->
  <rect x="250" y="170" width="400" height="70" rx="12" fill="url(#parser)" filter="url(#shadow)"/>
  <text x="450" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="white">Phase 1: Parser</text>
  <text x="450" y="216" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.9)">parse5 → HtmlNode AST (DOM tree)</text>

  <!-- Arrow -->
  <line x1="450" y1="240" x2="450" y2="272" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PHASE 2: CSS ANALYZER ===== -->
  <rect x="200" y="275" width="500" height="130" rx="12" fill="url(#css)" filter="url(#shadow)"/>
  <text x="450" y="300" text-anchor="middle" font-size="14" font-weight="700" fill="white">Phase 2: CSS Analyzer</text>
  <text x="450" y="318" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.9)">PostCSS → Cascade → ResolvedStyles → ComputedStyle</text>

  <!-- Sub-modules box -->
  <rect x="230" y="332" width="440" height="56" rx="8" fill="rgba(255,255,255,0.2)"/>
  <text x="450" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="rgba(255,255,255,0.95)">CSS Mapper Modules</text>
  <text x="450" y="366" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">ColorMapper · TypographyMapper · BorderMapper · ShadowMapper</text>
  <text x="450" y="380" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">SpacingMapper · LayoutMapper · GradientMapper · ImageMapper</text>

  <!-- Arrow -->
  <line x1="450" y1="405" x2="450" y2="437" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PHASE 3: SEMANTIC ANALYZER ===== -->
  <rect x="225" y="440" width="450" height="95" rx="12" fill="url(#semantic)" filter="url(#shadow)"/>
  <text x="450" y="465" text-anchor="middle" font-size="14" font-weight="700" fill="white">Phase 3: Semantic Analyzer</text>
  <text x="450" y="483" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.9)">18 Rule-based Detectors + Optional AI (Ollama)</text>
  <text x="450" y="503" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">navbar · hero · card · footer · form · dialog · list · tabs · sidebar …</text>

  <!-- Arrow -->
  <line x1="450" y1="535" x2="450" y2="567" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PHASE 4: IR CONSTRUCTION ===== -->
  <rect x="150" y="570" width="600" height="175" rx="12" fill="url(#ir)" filter="url(#shadow)"/>
  <text x="450" y="595" text-anchor="middle" font-size="14" font-weight="700" fill="white">Phase 4: Intermediate Representation (IR v2)</text>
  <text x="450" y="613" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.9)">Three-Layer IrNode Tree — Platform-Agnostic</text>

  <!-- Three sub-layers -->
  <rect x="180" y="630" width="170" height="90" rx="8" fill="rgba(255,255,255,0.2)"/>
  <text x="265" y="652" text-anchor="middle" font-size="12" font-weight="700" fill="white">SemanticIR</text>
  <text x="265" y="670" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">WHAT the element is</text>
  <text x="265" y="688" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">button · text · heading</text>
  <text x="265" y="704" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">image · form · link · list …</text>

  <rect x="365" y="630" width="170" height="90" rx="8" fill="rgba(255,255,255,0.2)"/>
  <text x="450" y="652" text-anchor="middle" font-size="12" font-weight="700" fill="white">LayoutIR</text>
  <text x="450" y="670" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">HOW children are arranged</text>
  <text x="450" y="688" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">flex · grid · stack · scroll</text>
  <text x="450" y="704" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">box · absolute · none</text>

  <rect x="550" y="630" width="170" height="90" rx="8" fill="rgba(255,255,255,0.2)"/>
  <text x="635" y="652" text-anchor="middle" font-size="12" font-weight="700" fill="white">TargetIR</text>
  <text x="635" y="670" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Codegen hints per platform</text>
  <text x="635" y="688" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">preferred widget · imports</text>
  <text x="635" y="704" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">modifier chain · styling</text>

  <!-- Arrow -->
  <line x1="450" y1="745" x2="450" y2="777" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PHASE 5: OPTIMIZER ===== -->
  <rect x="250" y="780" width="400" height="70" rx="12" fill="url(#optimizer)" filter="url(#shadow)"/>
  <text x="450" y="806" text-anchor="middle" font-size="14" font-weight="700" fill="white">Phase 5: Optimizer</text>
  <text x="450" y="826" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.9)">flattenContainers · mergeTextNodes · removeEmptyText · pruneUnusedProps</text>

  <!-- Arrow -->
  <line x1="450" y1="850" x2="450" y2="882" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PHASE 6: GENERATOR ===== -->
  <rect x="200" y="885" width="500" height="70" rx="12" fill="url(#generator)" filter="url(#shadow)"/>
  <text x="450" y="911" text-anchor="middle" font-size="14" font-weight="700" fill="white">Phase 6: Platform Generator</text>
  <text x="450" y="931" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.9)">IrEmitter interface · walkIrTree · platform-specific codegen</text>

  <!-- Arrow splits to 3 platforms -->
  <line x1="450" y1="955" x2="450" y2="980" stroke="#adb5bd" stroke-width="2"/>
  <line x1="150" y1="980" x2="750" y2="980" stroke="#adb5bd" stroke-width="2"/>
  <line x1="150" y1="980" x2="150" y2="1000" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="980" x2="450" y2="1000" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="750" y1="980" x2="750" y2="1000" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Flutter -->
  <rect x="50" y="1005" width="200" height="80" rx="12" fill="url(#flutter)" filter="url(#shadow)"/>
  <text x="150" y="1035" text-anchor="middle" font-size="14" font-weight="700" fill="white">Flutter</text>
  <text x="150" y="1055" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Dart · Material Design</text>
  <text x="150" y="1071" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">Container · Row · Column · Stack</text>

  <!-- Compose -->
  <rect x="350" y="1005" width="200" height="80" rx="12" fill="url(#compose)" filter="url(#shadow)"/>
  <text x="450" y="1035" text-anchor="middle" font-size="14" font-weight="700" fill="white">Jetpack Compose</text>
  <text x="450" y="1055" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Kotlin · Material 3</text>
  <text x="450" y="1071" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">Box · Row · Column · Scaffold</text>

  <!-- SwiftUI -->
  <rect x="650" y="1005" width="200" height="80" rx="12" fill="url(#swiftui)" filter="url(#shadow)"/>
  <text x="750" y="1035" text-anchor="middle" font-size="14" font-weight="700" fill="white">SwiftUI</text>
  <text x="750" y="1055" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Swift · iOS 17+</text>
  <text x="750" y="1071" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">VStack · HStack · ZStack · List</text>

  <!-- Extensibility note -->
  <rect x="225" y="1110" width="450" height="45" rx="22" fill="none" stroke="#adb5bd" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="450" y="1128" text-anchor="middle" font-size="11" fill="#868e96">Extensible: add React Native · Vue · Qt · MAUI · WinUI</text>
  <text x="450" y="1143" text-anchor="middle" font-size="10" fill="#868e96">without modifying parser, CSS analyzer, or layout engine</text>

  <!-- Legend -->
  <rect x="20" y="1110" width="180" height="50" rx="8" fill="white" fill-opacity="0.8" stroke="#dee2e6" stroke-width="1"/>
  <rect x="30" y="1120" width="12" height="12" rx="2" fill="url(#input)"/>
  <text x="48" y="1132" font-size="10" fill="#495057">Input</text>
  <rect x="90" y="1120" width="12" height="12" rx="2" fill="url(#parser)"/>
  <text x="108" y="1132" font-size="10" fill="#495057">Phase</text>
  <rect x="30" y="1140" width="12" height="12" rx="2" fill="url(#flutter)"/>
  <text x="48" y="1152" font-size="10" fill="#495057">Output</text>
  <rect x="90" y="1140" width="12" height="12" rx="2" fill="none" stroke="#adb5bd" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="108" y="1152" font-size="10" fill="#495057">Pluggable</text>
</svg>
